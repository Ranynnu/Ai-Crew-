gather_weather:
  description: >
    查询 {destination} 的实时天气。
  expected_output: >
    一个简明扼要的天气报告，包括温度、天气状况、湿度、风力以及穿衣建议。
  agent: weather_expert
  async_execution: true

# --- 预算估计 ---
estimate_budget:
  description: >
    用户为 {destination} 的 {days} 天旅行设定了预算：{budget}。
    请将该预算解析为每日分项预算分配表，按以下 JSON 结构输出（尽量精确）：

    {{
      "总预算": "...",
      "档次": "经济/中等/豪华",
      "每日预算": {{
        "住宿费": "元/晚",
        "门票费": "元/天",
        "餐饮费": {{
          "早餐": "元",
          "午餐": "元",
          "下午茶": "元",
          "晚餐": "元",
          "宵夜": "元"
        }},
        "交通费": "元/天",
        "购物/应急": "元/天"
      }},
      "消费提示": "针对目的地的省钱/防坑建议"
    }}

    档次判断规则：
    - 人均每日 <300 元 → "经济型"
    - 人均每日 300~800 元 → "中等"
    - 人均每日 >800 元 → "豪华"
    如果用户写的是描述词而非金额，请自行估算合理金额范围。
  expected_output: >
    每日预算分配表（结构化 JSON），含各分项金额和消费提示。
  agent: budget_expert
  async_execution: true

# --- 景点规划 ---
plan_attractions:
  description: >
    根据用户偏好（{preferences}）和预算约束（{budget_info}），为 {destination} {days} 天旅行规划具体的景点参观方案。
    考虑景点之间的距离和开放时间，合理安排每天上午、下午的景点。

    重要：每个景点必须注明：
    - 所在区域/地标位置（如"西湖区南山路"）
    - 预估门票价格
    - 适合上午还是下午游览
    - 活动强度（轻松/中等/高体力）
    请确保门票总和不超过每日预算。
  expected_output: >
    一份详细景点列表，分天列出，每个景点包含：
    名称、区域位置、门票价格、推荐理由、预估耗时、适合时段、活动强度。
  agent: attractions_expert
  async_execution: true

# --- 美食菜单 ---
plan_food:
  description: >
    根据用户偏好（{preferences}）和预算约束（{budget_info}），为 {destination} 推荐一个"食物菜单"。

    你必须为每家餐厅标注以下结构化信息（用自然语言即可，确保信息明确）：
    - 餐厅名称
    - 所在区域/位置（如"龙井路龙井村"、"南山路雷峰塔附近"）
    - 类型（农家菜/杭帮菜/小吃/火锅/西餐/茶馆/夜市 等）
    - 场景标签（可多个）：[早餐快速] [轻食补给] [正餐精致] [茶饮点心] [夜市小吃] [宵夜]
    - 适合餐段：[早餐] [午餐] [下午茶] [晚餐] [宵夜]（可多选）
    - 人均价格：XX 元
    - 室内/户外/露台
    - 特色（一句话）

    要求：
    - 餐厅必须覆盖一天中所有可能餐段（早餐、午餐、晚餐必须有推荐；下午茶和宵夜可选）
    - 按区域分组列出，方便后续与景点进行地理匹配
  expected_output: >
    结构化食物菜单，每家餐厅包含名称、区域、场景标签、适合餐段、人均、室内/户外、特色。
  agent: food_expert
  async_execution: true

# --- 行程整合 ---
create_itinerary:
  description: >
    你是行程整合总指挥。请将以下数据整合为一份有机的、耦合的旅行行程单。

    ===== 必须遵守的耦合规则 =====

    【早餐】（不与景点耦合，与住宿区域匹配）
    - 从食物菜单中选1家靠近市中心/主城区的早餐店
    - 风格：快捷、地道、符合用户偏好
    - 人均 ≤ 预算中"早餐"上限

    【上午景点】 从景点列表中选1-2个上午合适的

    【午餐】（与上午景点地理耦合 + 场景匹配 + 天气响应）
    - 必须步行可达（<1km）或同地铁/交通方向
    - 场景匹配：爬山/徒步后→轻食农家菜；博物馆后→茶馆简餐；商圈→精致正餐
    - 天气响应：雨天→室内有景观；晴天→可露台；冷天→热锅类
    - 人均 ≤ 预算中"午餐"上限
    - 如果食物菜单中没有符合的，基于地理常识自行替换

    【下午茶】（按体力触发）
    - 仅当上午景点活动强度≥中等时推荐
    - 茶饮/点心类型，靠近下午景点或两景点之间顺路

    【下午景点】 从景点列表中选1-2个下午合适的

    【晚餐】（与下午景点耦合 + 路线逻辑）
    - 位于下午景点附近或回住宿路线上
    - 场景/天气匹配规则同午餐
    - 人均 ≤ 预算中"晚餐"上限

    【宵夜】（严格条件触发）
    - 仅当当天有"夜市""夜游""夜景观"活动时才推荐，否则该餐段留空

    ===== 输出格式（每天严格按此结构，用 Markdown） =====

    # 【{destination}】{days}天{after_days}晚 超全自由行攻略 🌟

    ## 📅 行程概览
    - **出行日期**：请根据天气信息推断当前季节
    - **住宿区域**：请推荐最便利的住宿商圈
    - **天气情况**：根据 weather_info 写 emoji+文字（如 ☀️ 晴 22~28℃）
    - **用户标签**：从 preferences 提取 #标签
    - **总预算**：¥XXXX元（含门票/餐饮/交通）

    ---

    每天严格按以下格式输出：

    ## 🗓️ 第X天：主题名称（如\"经典地标+夜市烟火\"或\"爬山徒步+茶文化\"）

    ### ☀️ 早餐
    > **店名** | 人均 ¥XX | 位置（距住宿 xx 米）
    > 🥢 推荐：招牌菜品
    > ✅ 快捷 | 地道 | 符合预算

    ### 🏛️ 上午  (09:00 - 12:00)
    > **景点1** → **景点2**（可选）
    > 📍 位置：xx路 | 🎫 门票：¥XX（免费/半价）
    > 💪 强度：低/中/高（步行xx公里/爬升xx米）
    > 💡 贴士：避开人流/最佳拍照点/游玩时长约xx小时

    #### 🥢 午餐（与上午景点强耦合）
    > **店名** | 人均 ¥XX | 距景点步行 x 分钟
    > 📍 定位：地理-步行可达 / 场景-xx（如登山后轻食）/ 天气-xx（如晴天露台）
    > 🍽️ 招牌菜：xxxx

    ### 🍵 下午茶（仅上午强度≥中等时推荐）
    > **店名** | 人均 ¥XX | 类型：茶饮/甜品
    > 🕒 时间：14:00左右，歇脚充电

    ### 🏛️ 下午  (13:30 - 17:30)
    > **景点3** → **景点4**（可选）
    > 📍 位置：xx | 🎫 门票：¥XX | 💪 强度：低/中/高
    > 💡 贴士：下午光线最佳/避开周一闭馆

    #### 🥢 晚餐（与下午景点/回程路线耦合）
    > **店名** | 人均 ¥XX | 距景点/顺路方向 x 公里
    > 🚗 交通：步行/地铁x站/打车x分钟
    > 🎭 匹配：场景-博物馆后正餐 / 天气-冷天热锅

    ### 🌙 宵夜（仅当有夜游/夜市活动时，否则留空）
    > **夜市/小吃街名** | 人均 ¥XX
    > 🍢 必吃：xx、xx
    > ⏰ 营业至：22:00

    ### 💰 当日花费
    | 项目       | 金额（¥） |
    |------------|------------|
    | 门票       | XX         |
    | 早餐+午餐+晚餐 | XX+XX+XX |
    | 下午茶/宵夜 | XX         |
    | 小计       | **XX**     |
    | 预算上限   | XX         |

    ===== 输入数据 =====
    目的地：{destination}
    天数：{days}
    用户偏好：{preferences}
    预算分配：{budget_info}

    ===== 天气 =====
    {weather_info}

    ===== 景点规划 =====
    {attractions_info}

    ===== 食物菜单 =====
    {food_info}
  expected_output: >
    一份结构清晰、按天分餐段、景点与餐厅地理耦合的行程单，
    每餐附匹配理由，含每日预算预估。
  agent: coordinator
