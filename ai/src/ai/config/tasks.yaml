gather_weather:
  description: >
    查询 {destination} 的实时天气（温度、天气状况、湿度、风力），
    并附带一条穿衣建议。
  expected_output: >
    天气报告（含 emoji + 文字），格式：“☀️ 晴 22~28℃ | 湿度65% | 南风3级 | 建议穿薄外套”。
  agent: weather_expert
  async_execution: true

estimate_budget:
  description: >
    根据用户提供的总预算 {budget}（可能是金额或描述词），
    为 {destination} 的 {days} 天旅行生成每日预算分配表。
    输出必须包含：总预算、档次（经济/中等/豪华）、
    每日住宿费、每日门票费、每日餐饮总预算、每日交通费、每日购物/应急备用金。
    档次判断：人均每日<300→经济型，300~800→中等，>800→豪华。
    若用户未给金额，则按目的地消费水平估算合理值。
  expected_output: >
    预算分配的 JSON 对象，结构如下：
    {
      "总预算": "5000元",
      "档次": "中等",
      "每日预算": {
        "住宿费": "300元/晚",
        "门票费": "150元/天",
        "餐饮费": "200元/天",
        "交通费": "50元/天",
        "购物/应急": "100元/天"
      },
      "消费提示": "省心建议，如避开景区高价餐饮、使用公共交通等"
    }
  agent: budget_expert
  async_execution: true

plan_attractions:
  description: >
    根据用户偏好 {preferences} 和每日门票预算（从 {budget_info} 中获取），
    为 {destination} 的 {days} 天旅行生成一份“候选景点池”，每个景点必须注明：
    - 所在区域（如“西湖区南山路”）
    - 门票价格（含免费/半价信息）
    - 建议游览时段（上午/下午，考虑光线和开放时间）
    - 活动强度（低/中/高，需注明步行距离或爬升高度）
    - 游玩耗时（小时）
    所有门票总和不得超过每日门票预算，且景点之间需考虑地理邻近性（建议按区域分组）。
  expected_output: >
    按天分组的景点候选列表，每天包含 3~4 个景点（上午/下午各 1~2 个），
    每个景点含上述所有字段，并附简要推荐理由。
  agent: attractions_expert
  async_execution: true
  context: [budget_info]   # 依赖预算结果（在实现层声明）

plan_food:
  description: >
    根据用户偏好 {preferences} 和每日餐饮总预算（从 {budget_info} 中获取），
    为 {destination} 生成一份“候选餐厅池”，每个餐厅必须标注：
    - 名称、所在区域（精确到路或地标）
    - 菜系/类型（如杭帮菜、农家菜、小吃、茶馆）
    - 场景标签（如 [快速早餐]、[精致正餐]、[茶歇]、[夜市]）
    - 适合餐段（早餐/午餐/下午茶/晚餐/宵夜，可多选）
    - 人均消费（元）
    - 室内/户外/露台
    - 一句特色描述
    要求覆盖所有可能的餐段，并按区域分组，便于后续与景点匹配。
    每家餐厅的人均消费应在预算范围内。
  expected_output: >
    按区域分组的餐厅列表，每家餐厅含上述所有结构化字段，
    且标注“推荐餐段”和“匹配场景”。
  agent: food_expert
  async_execution: true
  context: [budget_info]

create_itinerary:
  description: >
    你是行程整合总指挥。请根据以下输入生成完整的每日行程单。

    【耦合规则】（必须逐一遵守）：
    1. 早餐：从餐厅池中选一家靠近住宿区域的快捷地道店，人均 ≤ 早餐预算（由你按比例从每日餐饮费中拆分）。
    2. 上午景点：从景点池中选 1~2 个，需考虑开放时间和体力合理。
    3. 午餐：必须与上午景点地理邻近（步行＜1km 或同交通方向），并匹配场景（爬山后选轻食、博物馆后选简餐、商圈选正餐）和当日天气（雨天找室内、晴天可用露台、冷天推热锅），人均 ≤ 午餐预算。
    4. 下午茶：仅当前日（或当日）上午景点活动强度≥中等时推荐，选靠近下午景点或顺路的茶饮店。
    5. 下午景点：从景点池中选 1~2 个，注意与上午景点的地理位置和体力衔接。
    6. 晚餐：与下午景点或回程路线耦合，匹配规则同午餐，人均 ≤ 晚餐预算。
    7. 宵夜：仅当当天安排了夜游、夜景观或夜市活动时才推荐，否则留空。

    所有餐厅和景点必须来自前置任务提供的 {attractions_info} 和 {food_info}，
    若池中无合适项，可基于地理常识和用户偏好自行补充（但需标注“替代推荐”）。

    每天需计算当日花费小计（门票+餐饮），并与预算上限对比。
  expected_output: >
    按天、按餐段组织的完整行程单，使用以下 Markdown 模板（必须严格遵循）：

    # 【{destination}】{days}天{after_days}晚 超全自由行攻略 🌟

    ## 📅 行程概览
    - **出行日期**：从天气信息推断季节
    - **住宿区域**：推荐最便利的商圈
    - **天气情况**：根据 weather_info 写 emoji+文字
    - **用户标签**：从 preferences 提取 #标签
    - **总预算**：¥XXXX元（含门票/餐饮/交通）

    ---

    ## 🗓️ 第X天：主题名称

    ### ☀️ 早餐
    > **店名** | 人均 ¥XX | 位置（距住宿 xx 米）
    > 🥢 推荐：招牌菜品
    > ✅ 快捷 | 地道 | 符合预算

    ### 🏛️ 上午  (09:00 - 12:00)
    > **景点1** → **景点2**（可选）
    > 📍 位置：xx路 | 🎫 门票：¥XX
    > 💪 强度：低/中/高（步行xx公里/爬升xx米）
    > 💡 贴士：避开人流/最佳拍照点/游玩时长

    #### 🥢 午餐（与上午景点强耦合）
    > **店名** | 人均 ¥XX | 距景点步行 x 分钟
    > 📍 定位：地理-步行可达 / 场景-xx / 天气-xx
    > 🍽️ 招牌菜：xxxx

    ### 🍵 下午茶（仅当上午强度≥中等时出现）
    > **店名** | 人均 ¥XX | 类型：茶饮/甜品
    > 🕒 时间：14:00左右

    ### 🏛️ 下午  (13:30 - 17:30)
    > **景点3** → **景点4**（可选）
    > （同上格式）

    #### 🥢 晚餐（与下午景点耦合）
    > **店名** | 人均 ¥XX | 距景点/顺路方向
    > 🚗 交通：步行/地铁/打车
    > 🎭 匹配：场景-xx / 天气-xx

    ### 🌙 宵夜（仅当有夜游/夜市时）
    > **夜市名** | 人均 ¥XX | 必吃菜品 | 营业时间

    ### 💰 当日花费
    | 项目       | 金额（¥） |
    |------------|------------|
    | 门票       | XX         |
    | 早餐+午餐+晚餐 | XX+XX+XX |
    | 下午茶/宵夜 | XX         |
    | 小计       | **XX**     |
    | 预算上限   | XX         |

    每天必须附带“耦合理由”说明（可放在“贴士”或“匹配”中），证明遵循了上述规则。
  agent: coordinator
  async_execution: false
  context: [weather_info, budget_info, attractions_info, food_info]